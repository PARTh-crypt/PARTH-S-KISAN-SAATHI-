<!DOCTYPE html>
<html lang="hi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>PARTH'S Kisan Saathi</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        :root { 
            --gold: #d4af37; 
            --dark-green: #0f1a0d;
            --main-green: #1a3a17;
            --silk: #f8fafc;
        }
        body { 
            background: var(--silk); 
            font-family: 'Segoe UI', system-ui, sans-serif; 
            margin: 0; padding: 0; 
            overflow-x: hidden;
            -webkit-tap-highlight-color: transparent;
        }

        /* 🏹 OFFICIAL SPLASH SCREEN */
        #splash {
            position: fixed; inset: 0; z-index: 10000;
            background: var(--dark-green);
            display: flex; flex-direction: column; align-items: center; justify-content: center;
            transition: transform 0.8s cubic-bezier(0.7, 0, 0.3, 1);
        }
        .logo-svg { width: 220px; filter: drop-shadow(0 0 25px rgba(212,175,55,0.6)); animation: pulse 2s infinite; }
        .brand-title { color: var(--gold); font-size: 38px; font-weight: 900; line-height: 0.9; margin-top: 20px; text-align: center; }
        
        @keyframes pulse { 0%, 100% { transform: scale(1); } 50% { transform: scale(1.05); } }

        /* MAIN APP */
        #app-body { display: none; padding-bottom: 120px; }
        .hero { 
            background: linear-gradient(to bottom, var(--main-green), #2d5a27);
            padding: 45px 20px 85px; border-radius: 0 0 50px 50px; color: white;
        }

        /* TOOLS GRID */
        .grid-section { padding: 0 20px; margin-top: -50px; }
        .tools-grid { display: grid; grid-template-columns: repeat(2, 1fr); gap: 15px; }
        .tool-btn {
            background: white; border-radius: 28px; padding: 25px 15px;
            display: flex; flex-direction: column; align-items: center;
            box-shadow: 0 10px 20px rgba(0,0,0,0.05); border: 1px solid #f1f5f9;
        }
        .tool-btn:active { transform: scale(0.95); background: #f0fdf4; }

        /* AI DRAWER */
        #ai-drawer {
            position: fixed; bottom: -100%; left: 0; width: 100%; height: 85vh;
            background: white; z-index: 5000; border-radius: 40px 40px 0 0;
            box-shadow: 0 -10px 40px rgba(0,0,0,0.2); transition: 0.4s ease-out;
            display: flex; flex-direction: column;
        }
        #ai-drawer.active { bottom: 0; }
        .chat-box { flex: 1; overflow-y: auto; padding: 20px; display: flex; flex-direction: column; gap: 10px; }
        .bubble { max-width: 80%; padding: 15px; border-radius: 20px; font-size: 14px; }
        .ai-msg { align-self: flex-start; background: #f1f5f9; color: #334155; border-left: 5px solid var(--gold); }
        .user-msg { align-self: flex-end; background: var(--main-green); color: white; }

        /* NAV */
        nav { 
            position: fixed; bottom: 20px; left: 20px; right: 20px; height: 75px;
            background: white; border-radius: 40px; display: flex;
            justify-content: space-around; align-items: center; box-shadow: 0 10px 30px rgba(0,0,0,0.1);
        }
        .ai-trigger { background: var(--gold); width: 60px; height: 60px; border-radius: 50%; margin-top: -40px; border: 5px solid white; display: flex; align-items: center; justify-content: center; font-size: 24px; }
    </style>
</head>
<body>

    <div id="splash">
        <svg class="logo-svg" viewBox="0 0 200 180" fill="none" xmlns="http://www.w3.org/2000/svg">
            <path d="M20 90C20 90 40 20 100 20C160 20 180 90 180 90" stroke="#d4af37" stroke-width="8" stroke-linecap="round"/>
            <path d="M20 90C20 90 40 160 100 160C160 160 180 90 180 90" stroke="#d4af37" stroke-width="8" stroke-linecap="round"/>
            <line x1="100" y1="20" x2="100" y2="160" stroke="#d4af37" stroke-width="2"/>
            <path d="M80 75L100 25L120 75" stroke="#d4af37" stroke-width="8" stroke-linejoin="round"/>
            <rect x="90" y="85" width="20" height="25" rx="4" fill="#d4af37"/>
        </svg>
        <div class="brand-title">PARTH'S<br><span style="font-size: 18px; letter-spacing: 4px; color: white;">KISAN SAATHI</span></div>
        <button onclick="System.start()" style="margin-top: 50px; background: var(--gold); color: black; padding: 15px 50px; border-radius: 50px; font-weight: 900;">AAGE BADHEIN</button>
    </div>

    <div id="app-body">
        <div class="hero">
            <h1 class="text-3xl font-black">नमस्ते, किसान भाई</h1>
            <p class="text-xs text-yellow-400 font-bold uppercase mt-1">PARTH'S Official App</p>
        </div>
        <div class="grid-section">
            <div class="tools-grid" id="tools"></div>
        </div>
    </div>

    <div id="ai-drawer">
        <div class="p-5 border-b flex justify-between items-center">
            <span class="font-black">PARTH'S AI SAATHI</span>
            <button onclick="System.toggleAI(false)" class="text-2xl">✕</button>
        </div>
        <div class="chat-box" id="chat">
            <div class="bubble ai-msg">राम-राम! मैं PARTH'S का AI साथी हूँ। पूछिए अपनी खेती से जुड़ा कोई भी सवाल।</div>
        </div>
        <div class="p-4 border-t flex gap-2">
            <input id="in" type="text" placeholder="यहाँ लिखें..." class="flex-1 bg-slate-100 p-4 rounded-xl outline-none">
            <button onclick="System.ask()" class="bg-green-800 text-white px-5 rounded-xl font-bold">BHEJEIN</button>
        </div>
    </div>

    <nav>
        <button onclick="location.reload()" class="text-xl">🏠</button>
        <button onclick="System.toggleAI(true)" class="ai-trigger">🤖</button>
        <button onclick="System.toggleAI(true)" class="text-xl">💬</button>
    </nav>

    <script>
        const key = ""; // Apni API Key yahan dalein
        const System = {
            data: [
                {n: "Mandi Bhav", i: "📊", d: "Gehu: ₹2510, Sarson: ₹5400, Chana: ₹6100."},
                {n: "Bimari Check", i: "🔍", d: "Patti par peela-pan Nitrogen ki kami hai. Urea ka prayog karein."},
                {n: "Mausam", i: "☁️", d: "Agli 24 ghanto mein dhoop khili rahegi."},
                {n: "Yojana", i: "📜", d: "PM-Kisan ki 17th kist check karne ke liye KYC zaroori hai."}
            ],
            start() {
                document.getElementById('splash').style.transform = 'translateY(-100%)';
                document.getElementById('app-body').style.display = 'block';
                this.render();
            },
            render() {
                document.getElementById('tools').innerHTML = this.data.map(t => `
                    <div class="tool-btn" onclick="alert('${t.d}')">
                        <div class="text-3xl mb-2">${t.i}</div>
                        <div class="text-xs font-black uppercase">${t.n}</div>
                    </div>
                `).join('');
            },
            toggleAI(s) { document.getElementById('ai-drawer').classList.toggle('active', s); },
            async ask() {
                const i = document.getElementById('in'), v = i.value.trim();
                if(!v) return;
                this.msg(v, 'user-msg'); i.value = "";
                const mid = 'ai'+Date.now(); this.msg('Soch raha hoon...', 'ai-msg', mid);
                try {
                    const res = await fetch(`https://generativelanguage.googleapis.com/v1beta/models/gemini-2.5-flash-preview-09-2025:generateContent?key=${key}`, {
                        method: 'POST', headers: {'Content-Type': 'application/json'},
                        body: JSON.stringify({contents: [{parts: [{text: `Aap PARTH'S company ke AI assistant hain. User kisan ka sawal hai: ${v}. Hindi mein dosti se chota jawab dein.`}]}]})
                    });
                    const d = await res.json();
                    document.getElementById(mid).innerText = d.candidates[0].content.parts[0].text;
                } catch(e) { document.getElementById(mid).innerText = "Net check karein!"; }
            },
            msg(t, c, id='') {
                const b = document.getElementById('chat');
                b.innerHTML += `<div class="bubble ${c}" ${id?`id="${id}"`:''}>${t}</div>`;
                b.scrollTop = b.scrollHeight;
            }
        };
    </script>
</body>
</html>
