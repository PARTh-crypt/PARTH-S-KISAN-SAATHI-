const OPENAI_API_KEY = "YAHAN_APNI_REAL_KEY_DALO";
<!DOCTYPE html>
<html lang="hi">

<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>PARTH KISAN SAATHI</title>

<script src="https://cdn.tailwindcss.com"></script>

<style>

body{
font-family:sans-serif;
background:#f0fdf4;
margin:0;
overflow:hidden;
}

.screen{
position:fixed;
inset:0;
display:none;
flex-direction:column;
}

.screen.active{
display:flex;
}

.header{
background:#065f46;
color:white;
padding:14px;
display:flex;
justify-content:space-between;
align-items:center;
font-weight:bold;
}

.grid{
display:grid;
grid-template-columns:1fr 1fr;
gap:12px;
padding:15px;
overflow:auto;
flex:1;
}

.tile{
background:white;
padding:18px;
border-radius:18px;
border:1px solid #ddd;
text-align:center;
font-weight:bold;
cursor:pointer;
}

.tile:active{
transform:scale(.95);
background:#ecfdf5;
}

.sheet{
position:fixed;
bottom:0;
width:100%;
background:white;
border-radius:25px 25px 0 0;
padding:20px;
max-height:70vh;
overflow:auto;
display:none;
}

.crop{
padding:14px;
border:1px solid #ddd;
border-radius:12px;
margin-bottom:10px;
cursor:pointer;
}

.chat{
flex:1;
overflow:auto;
padding:15px;
display:flex;
flex-direction:column;
gap:10px;
background:#f1f5f9;
}

.msg{
padding:12px;
border-radius:16px;
max-width:80%;
}

.user{
align-self:flex-end;
background:#065f46;
color:white;
}

.bot{
align-self:flex-start;
background:white;
border:1px solid #ddd;
}

.inputbar{
display:flex;
gap:10px;
padding:10px;
background:white;
}

input{
flex:1;
padding:12px;
border-radius:12px;
border:1px solid #ccc;
}

button{
background:#10b981;
color:white;
border:none;
padding:12px 18px;
border-radius:12px;
}

</style>

</head>

<body>

<div id="home" class="screen active">

<div class="header">
🏹 PARTH KISAN SAATHI
<button onclick="App.openAI()">🤖</button>
</div>

<div id="grid" class="grid"></div>

</div>

<div id="sheet" class="sheet">

<h2 id="sheetTitle" class="font-bold mb-4"></h2>

<div id="cropList"></div>

</div>

<div id="ai" class="screen">

<div class="header">
PARTH AI
<button onclick="App.closeAI()">X</button>
</div>

<div id="chat" class="chat">

<div class="msg bot">
Namaste! Farming question pooch sakte hain.
</div>

</div>

<div class="inputbar">

<input id="input" placeholder="Question poochiye">

<button onclick="App.send()">Send</button>

</div>

</div>

<script>

const OPENAI_API_KEY = "YAHAN_API_KEY_DALO";

const App={

db:{
"Crop Doctor":{
icon:"🏥",
crops:{
"Wheat":"Rust disease control Propiconazole spray",
"Paddy":"Blast control Tricyclazole spray",
"Tomato":"Fruit borer Coragen spray",
"Potato":"Late blight Mancozeb spray"
}
},

"Market Rates":{
icon:"📈",
crops:{
"Wheat":"Rate ₹2500 per quintal",
"Paddy":"Rate ₹3200 per quintal",
"Mustard":"Rate ₹5500 per quintal"
}
},

"Seeds":{
icon:"🌱",
crops:{
"Wheat":"HD2967 high yield variety",
"Paddy":"PR126 early variety"
}
}

},

init(){

let grid=document.getElementById("grid")

Object.keys(this.db).forEach(cat=>{

let div=document.createElement("div")

div.className="tile"

div.innerHTML=this.db[cat].icon+"<br>"+cat

div.onclick=()=>this.openCategory(cat)

grid.appendChild(div)

})

},

openCategory(cat){

let sheet=document.getElementById("sheet")

sheet.style.display="block"

document.getElementById("sheetTitle").innerText=cat

let list=document.getElementById("cropList")

list.innerHTML=""

let crops=this.db[cat].crops

Object.keys(crops).forEach(c=>{

let div=document.createElement("div")

div.className="crop"

div.innerText=c

div.onclick=()=>{

sheet.style.display="none"

this.openAI()

this.askAI(crops[c])

}

list.appendChild(div)

})

},

openAI(){

document.getElementById("ai").classList.add("active")

},

closeAI(){

document.getElementById("ai").classList.remove("active")

},

add(role,text){

let chat=document.getElementById("chat")

let div=document.createElement("div")

div.className="msg "+role

div.innerText=text

chat.appendChild(div)

chat.scrollTop=chat.scrollHeight

},

send(){

let input=document.getElementById("input")

if(!input.value)return

this.add("user",input.value)

this.askAI(input.value)

input.value=""

},

async askAI(q){

this.add("bot","Thinking...")

try{

let res=await fetch("https://api.openai.com/v1/chat/completions",{

method:"POST",

headers:{
"Content-Type":"application/json",
"Authorization":"Bearer "+OPENAI_API_KEY
},

body:JSON.stringify({

model:"gpt-4o-mini",

messages:[
{
role:"system",
content:"You are Parth AI farming expert. Answer in simple Hinglish with practical tips."
},
{
role:"user",
content:q
}
]

})

})

let data=await res.json()

let text=data.choices[0].message.content

document.querySelector(".bot:last-child").innerText=text

}catch(e){

document.querySelector(".bot:last-child").innerText="AI server error"

}

}

}

window.onload=()=>App.init()

</script>

</body>
</html>
